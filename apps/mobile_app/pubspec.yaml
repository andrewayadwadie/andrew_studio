name: mobile_app
description: Walluxe — Premium wallpaper app
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # Supabase (auth)
  supabase_flutter: ^2.9.1

  # Local storage

  # DI
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Image loading
  cached_network_image: ^3.4.1

  # Ads
  google_mobile_ads: ^5.3.0

  # Code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Shared core package (path dependency)
  andrew_studio_core:
    path: ../../packages/core

flutter:
  uses-material-design: true
  generate: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  injectable_generator: ^2.7.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_lints: ^5.0.0
